name: Deploy H5 to Baidu BOS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: bos-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build and export static site
        run: npm run build

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install Baidu BOS CLI
        run: |
          git clone --depth 1 https://github.com/baidubce/bce-cmd.git /tmp/bce-cmd
          cd /tmp/bce-cmd
          sh build.sh
          sudo install -m 0755 output/bcecmd /usr/local/bin/bcecmd
          bcecmd --version || true

      - name: Upload to Baidu BOS
        env:
          BCE_ACCESS_KEY: ${{ secrets.BCE_ACCESS_KEY }}
          BCE_SECRET_KEY: ${{ secrets.BCE_SECRET_KEY }}
          BOS_BUCKET: ${{ secrets.BOS_BUCKET }}
          BOS_ENDPOINT: ${{ secrets.BOS_ENDPOINT }}
        run: bash scripts/deploy.sh

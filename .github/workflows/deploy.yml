name: Deploy H5 to Baidu BOS

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: bos-production-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build, verify, and deploy static site
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22 with npm cache
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies from lockfile
        if: ${{ hashFiles('package-lock.json') != '' }}
        run: npm ci

      - name: Install dependencies without lockfile
        if: ${{ hashFiles('package-lock.json') == '' }}
        run: |
          echo "::warning::No package-lock.json found; using npm install. Commit a lockfile to make CI fully reproducible."
          npm install

      - name: Lint source
        run: npm run lint

      - name: Build static export
        run: npm run build

      - name: Verify static export output
        run: |
          test -f out/index.html
          test -d out/_next
          test ! -f out/BUILD_ID

      - name: Install Baidu BOS CLI
        run: python -m pip install --upgrade bcecmd

      - name: Deploy static export to Baidu BOS
        env:
          BCE_ACCESS_KEY: ${{ secrets.BCE_ACCESS_KEY }}
          BCE_SECRET_KEY: ${{ secrets.BCE_SECRET_KEY }}
          BOS_BUCKET: ${{ secrets.BOS_BUCKET }}
          BOS_ENDPOINT: ${{ secrets.BOS_ENDPOINT }}
        run: bash scripts/deploy.sh

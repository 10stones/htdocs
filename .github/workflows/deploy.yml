name: Deploy H5 to Baidu BOS

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: bos-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build and export static site
        run: npm run build

      - name: Install Baidu BOS Python SDK
        run: python -m pip install --upgrade bce-python-sdk

      - name: Upload to Baidu BOS
        env:
          BOS_ACCESS_KEY: ${{ secrets.BOS_ACCESS_KEY }}
          BOS_SECRET_KEY: ${{ secrets.BOS_SECRET_KEY }}
          # Fill this repository variable with the BOS bucket name, for example: zaneshi-h5-prod.
          BOS_BUCKET: ${{ vars.BOS_BUCKET }}
          # Fill this region value with the BOS bucket region, for example: bj.
          BOS_REGION: bj
        run: python scripts/upload_bos.py

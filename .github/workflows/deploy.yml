name: Deploy H5 to Baidu BOS

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

concurrency:
  group: bos-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build and export static site
        run: npm run build

      - name: Install Baidu BOS CLI
        run: python -m pip install --upgrade bcecmd

      - name: Upload to Baidu BOS
        env:
          BCE_ACCESS_KEY: ${{ secrets.BCE_ACCESS_KEY }}
          BCE_SECRET_KEY: ${{ secrets.BCE_SECRET_KEY }}
          BOS_BUCKET: ${{ secrets.BOS_BUCKET }}
          BOS_ENDPOINT: ${{ secrets.BOS_ENDPOINT }}
        run: bash scripts/deploy.sh

name: CI/CD

on:
  push:
    branches: [main, dev]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'beta' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm install
      - run: npm run lint
      - run: npm run build
      - name: Package standalone release
        run: |
          mkdir -p release/.next/static release/public
          cp -r .next/standalone/* release/
          cp -r .next/static release/.next/static
          cp -r public/* release/public/ 2>/dev/null || true
          cp package.json release/
          cp package-lock.json release/ 2>/dev/null || true
          tar -czf zaneshi-release.tar.gz -C release .
      - name: Upload release and deploy
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: zaneshi-release.tar.gz,scripts/deploy.sh
          target: /tmp/zaneshi-deploy
      - name: Execute remote deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          SERVER_PATH: ${{ secrets.SERVER_PATH }}
          GITHUB_SHA: ${{ github.sha }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          port: ${{ secrets.SERVER_PORT }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: SERVER_PATH,GITHUB_SHA
          script: |
            mv /tmp/zaneshi-deploy/zaneshi-release.tar.gz /tmp/zaneshi-release.tar.gz
            bash /tmp/zaneshi-deploy/scripts/deploy.sh

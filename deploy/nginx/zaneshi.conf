map $http_upgrade $connection_upgrade { default upgrade; '' close; }

upstream zaneshi_next { server 127.0.0.1:3000; keepalive 64; }

server {
  listen 80;
  listen [::]:80;
  server_name zaneshi.com www.zaneshi.com beta.zaneshi.com;
  location /.well-known/acme-challenge/ { root /var/www/letsencrypt; }
  location / { return 301 https://$host$request_uri; }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  # listen 443 quic reuseport; # Enable only after Nginx is built with HTTP/3 support.
  server_name zaneshi.com www.zaneshi.com beta.zaneshi.com;

  ssl_certificate /etc/letsencrypt/live/zaneshi.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/zaneshi.com/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

  gzip on;
  gzip_comp_level 5;
  gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;
  brotli on;
  brotli_comp_level 5;
  brotli_types text/plain text/css application/json application/javascript application/xml image/svg+xml;

  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;

  location /_next/static/ {
    proxy_pass http://zaneshi_next;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  location / {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_pass http://zaneshi_next;
  }
}
